name = "pp-api"
main = "src/index.ts"
workers_dev = true
compatibility_date = "2024-01-29"
compatibility_flags = ["nodejs_compat"]

[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = false

routes = [
	{ pattern = "api.protocol-pawns.com", custom_domain = true }
]

[[kv_namespaces]]
binding = "LEADERBOARD_CACHE"
id = "58ad893c51224f928c34c19f0bdda19c"

[durable_objects]
bindings = [
  { name = "SSE_HUB", class_name = "SSEHub" }
]

[[migrations]]
tag = "v1"
new_classes = ["SSEHub"]

[vars]
VAPID_SUBJECT = "mailto:admin@protocol-pawns.com"
VAPID_PUBLIC_KEY = "BM4Wktu_G9xs5JWCqXaQHa2TrGdjIdz6hUF1JrKZUfa43ANx_bZl8_wXj3pnLGr2xNg6Ot12oCqgbhqwEFgVA18"
RPC_URL = "https://rpc.shitzuapes.xyz"
CONTRACT_ID = "app.chess-game.near"
SSE_DEBUG = "false"

[triggers]
crons = ["*/5 * * * *"]

[observability]
enabled = true
